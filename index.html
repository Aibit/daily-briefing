<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mpe Daily Briefing</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #0f0f0f; color: #e0e0e0; }
  h1 { color: #fff; border-bottom: 2px solid #333; padding-bottom: 12px; }
  .date { color: #888; font-size: 0.9em; margin-top: -10px; margin-bottom: 30px; }
  .section { margin-bottom: 36px; }
  .section h2 { color: #4da6ff; font-size: 1.1em; letter-spacing: 0.05em; text-transform: uppercase; }
  .story { background: #1a1a1a; border-left: 3px solid #4da6ff; padding: 14px 16px; margin-bottom: 14px; border-radius: 4px; }
  .story h3 { margin: 0 0 6px; font-size: 1em; color: #fff; }
  .story p { margin: 0 0 8px; color: #bbb; font-size: 0.9em; line-height: 1.5; }
  .story a { color: #4da6ff; text-decoration: none; font-size: 0.85em; }
  .story a:hover { text-decoration: underline; }
  .signal { background: #1a2a1a; border-left: 3px solid #4dff88; padding: 14px 16px; border-radius: 4px; margin-top: 30px; }
  .signal h2 { color: #4dff88; margin: 0 0 8px; font-size: 0.9em; letter-spacing: 0.1em; text-transform: uppercase; }
  .signal p { margin: 0; color: #ccc; }
  .placeholder { color: #555; text-align: center; padding: 60px 20px; }
</style>
</head>
<body>
<h1>☀️ mpe Daily Briefing</h1>
<p class="date">Your briefing will appear here each morning at 8:00 AM Madrid time.</p>
<div class="placeholder">
  <p>⏳ First briefing coming tomorrow morning...</p>
</div>
</body>
</html>
